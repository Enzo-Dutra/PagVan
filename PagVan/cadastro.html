<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>PagVan</title>
</head>
<body>
    <header>
        <h1>PagVan</h1>
        <h3>O sistema oficial dos Tios de Van Escolar</h3>
    </header>
    <h1 class="titulocadastro">Cadastro</h1>
    <div class="cadastro">
        <p class="p1">
            <input type="text" name="email" class="email_input" placeholder=" Email"><br><br>
            <input type="text" name="nome" class="nome_input" placeholder=" Nome"><br><br>
            <input type="text" name="telefone" class="telefone_input" placeholder=" (XX) XXXXX-XXXX"></p>
        <p class="p2">
            <input type="text" name="CPF" class="cpf_input" placeholder=" CPF"><br><br>
            <input type="password"  class="senha_input" placeholder=" Senha"><br><br>
            <input type="password" class="senha_input" placeholder=" Confirme sua senha">
        </p>
        <p class="p3">
            <button type="submit">Cadastrar</button><br>
            Já possuí uma conta? <a href="login.html">Faça login!</a>
        </p>
    </div>

</html>
